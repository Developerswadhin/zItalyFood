<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <title>Currency Converter</title>
  </head>
  <body class="my-5">
    <div class="currency-converter my-5 mx-auto">
      <div class="container">
        <div class="row mx-auto">
          <div class="col-lg-2"></div>
          <div class="col-lg-8">
            <div class="card">
              <div class="card-header bg-primary text-white">
                <h3>Marriage Age Checker</h3>
              </div>
              <div class="card-body">
                <form action="/marrageChecker" method="POST">
                  <div class="row">
                    <div class="col-lg-12">
                      <label class="form-label" for="name">Name</label>
                      <input
                        class="form-control"
                        type="text"
                        name="name"
                        id=""
                      />
                    </div>
                    <div class="col-lg-12">
                      <label class="form-label" for="amount" required="required"
                        >Birth Year</label
                      >
                      <input
                        class="form-control"
                        type="date"
                        name="dob"
                        id=""
                      />
                    </div>
                    <div class="col-lg-12 my-2">
                      <label class="form-label" for="gender">Gender</label>
                      <input type="radio" name="gender" id="" value="male" />
                      <label class="form-label" for="for Male">Male</label>
                      <input type="radio" name="gender" id="" value="female" />
                      <label class="form-label" for="for female">Female</label>
                    </div>

                    <div class="col-lg-6 my-2">
                      <button type="submit" class="btn btn-primary">
                        Check
                      </button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
          <div class="col-lg-2"></div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
